# ============================================================
# Revenue Assurance Platform - Docker Compose (Production)
# ============================================================
version: "3.9"

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ra_metadata
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  # --- API Gateway ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ra-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *common-env
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      API_WORKERS: ${API_WORKERS:-4}
    env_file:
      - .env.${ENVIRONMENT:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - export-data:/data/ra-exports
      - backup-data:/data/ra-backups
      - ctl-data:/data/ra-ctl
    networks:
      - ra-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # --- Job Workers ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ra-worker
    restart: unless-stopped
    command: ["python", "-m", "src.workers.queue"]
    environment:
      <<: *common-env
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      JOB_PARALLEL_WORKERS: ${JOB_PARALLEL_WORKERS:-4}
    env_file:
      - .env.${ENVIRONMENT:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - export-data:/data/ra-exports
      - backup-data:/data/ra-backups
      - ctl-data:/data/ra-ctl
    networks:
      - ra-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  # --- Scheduler ---
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ra-scheduler
    restart: unless-stopped
    command: ["python", "-m", "src.services.scheduler_service"]
    environment:
      <<: *common-env
      ENVIRONMENT: ${ENVIRONMENT:-prod}
    env_file:
      - .env.${ENVIRONMENT:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ra-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # --- PostgreSQL (Metadata Store) ---
  postgres:
    image: postgres:16-alpine
    container_name: ra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ra_metadata
      POSTGRES_USER: ${POSTGRES_USER:-ra_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
      - ./migrations/002_seed_legacy_data.sql:/docker-entrypoint-initdb.d/002_seed_legacy_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ra_admin} -d ra_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ra-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # --- Redis (Job Queue / Cache) ---
  redis:
    image: redis:7-alpine
    container_name: ra-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ra-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  export-data:
    driver: local
  backup-data:
    driver: local
  ctl-data:
    driver: local

networks:
  ra-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
