# ============================================
# Production Docker Compose — Fully Isolated
# ============================================
# Everything runs in containers. Nothing touches the host
# except ports 80/443 for Nginx.
#
# Usage:
#   1. Copy .env.production.example to .env.production
#   2. Fill in all values
#   3. docker compose --env-file .env.production up -d --build
# ============================================

services:
  # --- MongoDB ---
  mongo:
    image: mongo:7
    container_name: inst-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-inst_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - internal
    # No ports exposed to host — only internal network
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER:-inst_admin}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Next.js + Payload CMS App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MONGODB_URI: mongodb://${MONGO_USER:-inst_admin}:${MONGO_PASSWORD}@mongo:27017/inst-website?authSource=admin
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL}
    container_name: inst-app
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-inst_admin}:${MONGO_PASSWORD}@mongo:27017/inst-website?authSource=admin
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      NODE_ENV: production
    volumes:
      - media_uploads:/app/media
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    # No ports exposed to host — only Nginx can reach it
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Nginx Reverse Proxy + SSL ---
  nginx:
    image: nginx:alpine
    container_name: inst-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  # --- Certbot (SSL certificate manager) ---
  certbot:
    image: certbot/certbot
    container_name: inst-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Runs once then exits. Renewal is handled by cron/script.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  media_uploads:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  internal:
    driver: bridge
