# ============================================================
# Revenue Assurance Platform - CI/CD Pipeline
# Compatible with: GitHub Actions, GitLab CI, Azure DevOps
# This example uses GitHub Actions syntax
# ============================================================

name: RA Platform CI/CD

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ra-platform

jobs:
  # --- Stage 1: Lint & Static Analysis ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff mypy black
      - name: Run black (format check)
        run: black --check src/ tests/
      - name: Run ruff (lint)
        run: ruff check src/ tests/
      - name: Run mypy (type check)
        run: mypy src/ --ignore-missing-imports

  # --- Stage 2: Unit & Integration Tests ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ra_metadata_test
          POSTGRES_USER: ra_test
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: ra_metadata_test
          POSTGRES_USER: ra_test
          POSTGRES_PASSWORD: test_password
        run: |
          PGPASSWORD=test_password psql -h localhost -U ra_test -d ra_metadata_test -f migrations/001_initial_schema.sql
      - name: Run tests
        env:
          ENVIRONMENT: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ra_metadata_test
          POSTGRES_USER: ra_test
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: test-secret-key
        run: pytest tests/ -v --cov=src --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # --- Stage 3: Build & Push Container ---
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Stage 4: Deploy to UAT ---
  deploy-uat:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: uat
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to UAT cluster
        run: |
          kubectl set image deployment/ra-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ra-platform-uat
          kubectl set image deployment/ra-worker worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ra-platform-uat
          kubectl rollout status deployment/ra-api -n ra-platform-uat --timeout=300s

  # --- Stage 5: Deploy to Production ---
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production cluster
        run: |
          kubectl set image deployment/ra-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ra-platform
          kubectl set image deployment/ra-worker worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ra-platform
          kubectl set image deployment/ra-scheduler scheduler=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ra-platform
          kubectl rollout status deployment/ra-api -n ra-platform --timeout=300s
