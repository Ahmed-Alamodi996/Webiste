<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RA Platform{% endblock %}</title>
    <!-- Bootstrap 5.3 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- HTMX for interactive updates -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --sidebar-width: 240px;
            --primary: #1a73e8;
        }
        body { min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: linear-gradient(135deg, #1a237e 0%, #1565c0 100%);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            padding-top: 0;
            transition: all 0.3s;
        }
        .sidebar .brand {
            padding: 20px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .sidebar .brand small {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 4px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.75);
            padding: 12px 20px;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.12);
            border-left-color: #fff;
            font-weight: 600;
        }
        .sidebar .nav-link i {
            margin-right: 10px;
            font-size: 1.1rem;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 20px 30px;
            min-height: 100vh;
            background: #f4f6f9;
        }
        .page-header {
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #dee2e6;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .stat-card .card-body {
            padding: 20px;
        }
        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-status {
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 20px;
        }
        .table-container table { margin: 0; }
        .btn-action { font-size: 0.85rem; padding: 4px 12px; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1050; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="bi bi-shield-check"></i> RA Platform
            <small>Revenue Assurance Automation</small>
        </div>
        <nav class="mt-2">
            {% for item in nav_items %}
            <a href="{{ item.url }}" class="nav-link {% if current_page == item.id %}active{% endif %}">
                <i class="bi {{ item.icon }}"></i> {{ item.name }}
            </a>
            {% endfor %}
        </nav>
        <div class="mt-auto p-3" style="position: absolute; bottom: 0; width: 100%;">
            <div class="text-white-50 text-center" style="font-size: 0.75rem;">
                <div id="health-indicator" hx-get="/api/v1/health" hx-trigger="load, every 30s"
                     hx-swap="innerHTML" hx-target="#health-status">
                    <span id="health-status">
                        <i class="bi bi-circle-fill text-secondary"></i> Checking...
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Toast container for notifications -->
    <div class="toast-container" id="toasts"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // API helper
        const API_BASE = '/api/v1';

        async function apiFetch(path, options = {}) {
            const token = localStorage.getItem('ra_token') || '';
            const resp = await fetch(API_BASE + path, {
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token ? `Bearer ${token}` : '',
                    ...options.headers,
                },
                ...options,
            });
            if (resp.status === 401) {
                showToast('Session expired. Please log in.', 'warning');
                return null;
            }
            return resp.json();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toasts');
            const bgMap = {info: 'bg-primary', success: 'bg-success', danger: 'bg-danger', warning: 'bg-warning'};
            const id = 'toast-' + Date.now();
            container.innerHTML += `
                <div id="${id}" class="toast show align-items-center text-white ${bgMap[type] || bgMap.info}" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>`;
            setTimeout(() => document.getElementById(id)?.remove(), 5000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString();
        }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            if (seconds < 60) return seconds.toFixed(1) + 's';
            if (seconds < 3600) return (seconds / 60).toFixed(1) + 'm';
            return (seconds / 3600).toFixed(1) + 'h';
        }

        function statusBadge(status) {
            const map = {
                success: 'bg-success', completed: 'bg-success',
                running: 'bg-warning text-dark', in_progress: 'bg-warning text-dark',
                pending: 'bg-info', queued: 'bg-info',
                failed: 'bg-danger', error: 'bg-danger', timeout: 'bg-danger',
                cancelled: 'bg-secondary',
            };
            const cls = map[status?.toLowerCase()] || 'bg-secondary';
            return `<span class="badge badge-status ${cls}">${(status || 'unknown').toUpperCase()}</span>`;
        }

        // Health check HTMX handler
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.pathInfo?.requestPath === '/api/v1/health') {
                try {
                    const data = JSON.parse(evt.detail.xhr.responseText);
                    const color = data.status === 'healthy' ? 'text-success' :
                                  data.status === 'degraded' ? 'text-warning' : 'text-danger';
                    evt.detail.target.innerHTML = `<i class="bi bi-circle-fill ${color}"></i> ${data.status}`;
                } catch(e) {
                    evt.detail.target.innerHTML = '<i class="bi bi-circle-fill text-danger"></i> Error';
                }
            }
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
