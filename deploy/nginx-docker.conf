# ============================================
# Nginx — InST Website (Docker)
# Supports: inst-sa.com + inst.sa
# ============================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream nextjs {
    server app:3000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name inst-sa.com www.inst-sa.com inst.sa www.inst.sa;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → non-www (pick primary domain)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.inst-sa.com;

    ssl_certificate /etc/letsencrypt/live/inst-sa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inst-sa.com/privkey.pem;

    return 301 https://inst-sa.com$request_uri;
}

# Redirect inst.sa → inst-sa.com (or keep both — uncomment alternative below)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inst.sa www.inst.sa;

    ssl_certificate /etc/letsencrypt/live/inst.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inst.sa/privkey.pem;

    return 301 https://inst-sa.com$request_uri;
}

# Main HTTPS server — inst-sa.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inst-sa.com;

    # SSL
    ssl_certificate /etc/letsencrypt/live/inst-sa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inst-sa.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Admin — strict rate limit (5 req/sec)
    location /admin {
        limit_req zone=admin burst=10 nodelay;

        # OPTIONAL: Restrict admin to your IP only
        # Uncomment and replace with your IP:
        # allow YOUR_IP;
        # deny all;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — moderate rate limit
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — immutable cache
    location /_next/static {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Default
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Block sensitive files
    location ~ /\. { deny all; return 404; }
    location ~ \.(env|git|dockerignore)$ { deny all; return 404; }
}
