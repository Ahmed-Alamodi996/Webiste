apiVersion: v1
kind: ConfigMap
metadata:
  name: ra-platform-config
  namespace: ra-platform
  labels:
    app.kubernetes.io/name: ra-platform
data:
  ENVIRONMENT: "prod"
  LOG_LEVEL: "INFO"
  API_PORT: "8000"
  API_WORKERS: "4"
  POSTGRES_HOST: "ra-postgres-svc"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ra_metadata"
  POSTGRES_POOL_SIZE: "30"
  POSTGRES_MAX_OVERFLOW: "20"
  REDIS_HOST: "ra-redis-svc"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  ORACLE_PORT: "1521"
  JOB_DEFAULT_TIMEOUT_SECONDS: "3600"
  JOB_MAX_RETRIES: "3"
  JOB_CHUNK_SIZE: "50000"
  JOB_PARALLEL_WORKERS: "8"
  SLA_EXPORT_MAX_DURATION_MINUTES: "30"
  SLA_LOAD_MAX_DURATION_MINUTES: "60"
  SLA_REFRESH_MAX_DURATION_MINUTES: "120"
  SLA_BREACH_ALERT_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: ra-platform-secrets
  namespace: ra-platform
type: Opaque
stringData:
  POSTGRES_USER: "SET_VIA_CI_OR_VAULT"
  POSTGRES_PASSWORD: "SET_VIA_CI_OR_VAULT"
  ORACLE_HOST: "SET_VIA_CI_OR_VAULT"
  ORACLE_SID: "SET_VIA_CI_OR_VAULT"
  ORACLE_USER: "SET_VIA_CI_OR_VAULT"
  ORACLE_PASSWORD: "SET_VIA_CI_OR_VAULT"
  REDIS_PASSWORD: "SET_VIA_CI_OR_VAULT"
  JWT_SECRET_KEY: "SET_VIA_CI_OR_VAULT"
